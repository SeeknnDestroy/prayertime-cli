name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Race Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        run: make lint

  vuln:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: make vuln

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate docs and completions
        run: make docs-check

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Syft
        run: ./.github/scripts/install-syft.sh

      - name: Release snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.14.3
          args: release --snapshot --clean
        env:
          HOMEBREW_TAP_OWNER: ${{ vars.HOMEBREW_TAP_OWNER || 'SeeknnDestroy' }}
          HOMEBREW_TAP_NAME: ${{ vars.HOMEBREW_TAP_NAME || 'homebrew-tap' }}
          SCOOP_BUCKET_OWNER: ${{ vars.SCOOP_BUCKET_OWNER || 'SeeknnDestroy' }}
          SCOOP_BUCKET_NAME: ${{ vars.SCOOP_BUCKET_NAME || 'scoop-bucket' }}
